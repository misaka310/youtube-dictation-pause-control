# managed-by: repo-launch-doctor-public-guard-v1
name: Repo Launch Doctor

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  doctor:
    name: public-readiness
    runs-on: ubuntu-latest
    steps:
      - name: Check out target repository
        uses: actions/checkout@v4
        with:
          path: target

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check out Repo Launch Doctor
        uses: actions/checkout@v4
        with:
          repository: misaka310/repo-launch-doctor
          ref: 640f1796997df7be7344c33272924715eef0d29d
          path: doctor

      - name: Run Repo Launch Doctor
        working-directory: doctor
        run: >-
          python -m repo_launch_doctor scan ../target
          --output "${{ runner.temp }}/repo-launch-doctor"
          --fail-on high

      - name: Upload Repo Launch Doctor report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repo-launch-doctor-report
          path: ${{ runner.temp }}/repo-launch-doctor
          if-no-files-found: warn