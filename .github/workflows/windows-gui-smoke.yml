name: Windows GUI smoke

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read

jobs:
  tray-ui-smoke:
    if: github.event_name == 'workflow_dispatch' || vars.GUI_SELF_HOSTED_ENABLED == 'true'
    runs-on: [self-hosted, windows, x64, gui-automation]
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run packaged tray GUI smoke
        shell: powershell
        run: npm run test:gui:windows

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-gui-smoke-${{ github.run_id }}
          path: test-results/windows-gui-smoke
          if-no-files-found: ignore
          retention-days: 14
