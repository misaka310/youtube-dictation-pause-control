name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Validate tag and package version
        shell: powershell
        run: ./scripts/windows/validate-release-tag.ps1 -Tag $env:GITHUB_REF_NAME
      - name: Run all tests
        run: npm test
      - name: Build self-contained Windows package
        shell: powershell
        run: ./scripts/windows/build-release.ps1
      - name: Prepare release assets
        shell: powershell
        run: |
          $package = Get-Content -Raw -LiteralPath package.json | ConvertFrom-Json
          $zipPath = "dist\YouTubeDictationPauseControl-$($package.version)-windows-x64.zip"
          if (-not (Test-Path -LiteralPath $zipPath)) {
            throw "Release ZIP was not created: $zipPath"
          }
          $zipHash = (Get-FileHash -LiteralPath $zipPath -Algorithm SHA256).Hash.ToLowerInvariant()
          $checksumPath = 'dist\SHA256SUMS.txt'
          "$zipHash  $([System.IO.Path]::GetFileName($zipPath))" | Set-Content -LiteralPath $checksumPath -Encoding ascii
      - name: Publish GitHub Release
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          $package = Get-Content -Raw -LiteralPath package.json | ConvertFrom-Json
          $zipPath = "dist\YouTubeDictationPauseControl-$($package.version)-windows-x64.zip"
          $checksumPath = 'dist\SHA256SUMS.txt'
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $zipPath $checksumPath --clobber
          } else {
            gh release create $tag $zipPath $checksumPath --verify-tag --generate-notes --title "YouTube Dictation Pause Control $tag"
          }
          if ($LASTEXITCODE -ne 0) {
            throw "GitHub Release publication failed with exit code $LASTEXITCODE."
          }
